<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NT Reading Plan · Summer 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;1,400&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    :root {
      --blue: #111111;
      --blue-bg: #efefef;
      --rose: #666666;
      --rose-bg: #f0f0f0;
      --bg: #fafafa;
      --card: #ffffff;
      --border: rgba(0,0,0,0.09);
      --text: #111111;
      --muted: #555555;
      --hint: #999999;
      --shadow: 0 2px 20px rgba(0,0,0,0.06);
      --radius: 18px;
      --radius-sm: 10px;
      /* time-of-day gradient stops — updated by JS */
      --grad-1: #e3e9ee;
      --grad-2: #dfe6ec;
      --grad-3: #e6ecf0;
      --grad-4: #e3e9ee;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @keyframes bg-breathe {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes check-pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.42); }
      58%  { transform: scale(0.86); }
      78%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    .check-pop { animation: check-pop 0.45s cubic-bezier(.36,.07,.19,.97) both !important; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(-45deg, var(--grad-1), var(--grad-2), var(--grad-3), var(--grad-4));
      background-size: 400% 400%;
      animation: bg-breathe 22s ease infinite;
      color: var(--text);
      min-height: 100vh;
    }
    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    .header { margin-bottom: 32px; }
    .header-eyebrow {
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--hint); margin-bottom: 6px;
    }
    .header-title {
      font-family: 'Lora', serif;
      font-size: 28px; font-weight: 500;
      color: var(--text); line-height: 1.2;
    }
    .header-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .progress-grid {
      display: flex; flex-direction: row;
      gap: 12px; margin-bottom: 28px;
    }
    .progress-card {
      flex: 1; min-width: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px; box-shadow: var(--shadow);
    }
    .progress-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .avatar-lg {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .name-label { font-size: 13px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .count-label { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; }
    .pbar-track { height: 6px; border-radius: 99px; background: #f0ece7; overflow: hidden; }
    .pbar-fill { height: 100%; border-radius: 99px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
    .you-tag {
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 99px;
      margin-left: 4px; vertical-align: middle;
    }

    .week { margin-bottom: 8px; }
    .week-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow);
    }
    .week-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; cursor: pointer; user-select: none;
      transition: background 0.1s;
    }
    .week-header:hover { background: #faf8f5; }
    .week-header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .week-num { font-size: 14px; font-weight: 700; }
    .week-dates { font-size: 12px; color: var(--muted); }
    .week-header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .mini-progress { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; }
    .chevron { font-size: 14px; color: var(--hint); transition: transform 0.2s; display: inline-block; }
    .chevron.open { transform: rotate(180deg); }
    .week-body { border-top: 1px solid var(--border); }

    .day-row {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 18px; border-bottom: 1px solid #f5f0eb;
      transition: background 0.1s;
    }
    .day-row:last-child { border-bottom: none; }
    .day-row.both-done { background: #fdfbf8; }
    .day-row.today-row { border-left: 3px solid var(--accent); padding-left: 15px; }
    .day-date { flex-shrink: 0; width: 78px; }
    .day-weekday { font-size: 11px; color: var(--hint); font-weight: 600; }
    .day-datenum { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 1px; }
    .phase-pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .day-reading { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
    .day-reading.faded { color: var(--hint); text-decoration: line-through; }
    .day-checks { display: flex; gap: 7px; flex-shrink: 0; }
    .check-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      border: 2px solid transparent; user-select: none;
    }
    .check-avatar.mine:hover { transform: scale(1.1); }
    .check-avatar.not-mine { cursor: default; opacity: 0.65; }
    .check-avatar .checkmark { font-size: 13px; line-height: 1; }

    .setup-wrap {
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 0 40px; text-align: center;
    }
    .setup-title {
      font-family: 'Lora', serif;
      font-size: 24px; font-weight: 500; margin-bottom: 6px;
    }
    .setup-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
    .slot-grid {
      display: flex; flex-direction: row;
      gap: 12px; width: 100%; max-width: 380px; margin-bottom: 20px;
    }
    .slot-card { flex: 1; min-width: 0; }
    .slot-card {
      background: var(--card); border: 2px solid var(--border);
      border-radius: var(--radius); padding: 20px 16px;
      cursor: pointer; transition: border-color 0.15s, transform 0.1s; text-align: center;
    }
    .slot-card:hover { transform: translateY(-1px); }
    .slot-card.selected-blue { border-color: var(--blue); }
    .slot-card.selected-rose { border-color: var(--rose); }
    .slot-av-lg {

      font-size: 16px; font-weight: 800; margin: 0 auto 10px;

    .slot-status { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .name-input {
      width: 100%; max-width: 280px;
      padding: 12px 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 600;
      border: 2px solid var(--border); border-radius: var(--radius-sm);
      background: var(--card); color: var(--text);
      outline: none; margin-bottom: 14px;
      transition: border-color 0.15s; text-align: center;

    .cta-btn {
      padding: 12px 32px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 700;
      border: none; border-radius: var(--radius-sm);
      cursor: pointer; color: #fff;
      transition: opacity 0.15s, transform 0.1s;

    .cta-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .cta-btn:active { transform: scale(0.98); }
    .cta-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
    .setup-hint { font-size: 12px; color: var(--hint); margin-top: 16px; max-width: 300px; line-height: 1.6; }
    .saving-label { font-size: 11px; color: var(--hint); margin-top: 8px; min-height: 16px; }

    .phase-chip {
      font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 99px;

    }
    .config-notice {
      background: #fff8ed; border: 1px solid #f5d89e;
      border-radius: var(--radius-sm); padding: 20px 24px;
      font-size: 13px; color: #7c5c1e; line-height: 1.7;

    .config-notice strong { font-weight: 700; }
    .config-notice code {
      font-family: monospace; background: rgba(0,0,0,0.07);
      padding: 1px 5px; border-radius: 4px; font-size: 12px;
    }
    .config-notice ol { margin: 10px 0 0 16px; }
    .config-notice li { margin-bottom: 6px; }

    /* ── Notes ── */
    .note-toggle {
      background: none; border: none; cursor: pointer;
      color: var(--hint); font-size: 13px; padding: 2px 4px;
      line-height: 1; flex-shrink: 0;
      transition: color 0.15s;
    }
    .note-toggle:hover { color: var(--text); }
    .note-toggle.has-note { color: var(--muted); }
    .note-panel {

    }
    .note-entry { display: flex; flex-direction: column; gap: 4px; }
    .note-label {

    }
    .note-textarea {

    #ambient-strip {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--hint);
      letter-spacing: 0.07em;
      font-family: 'Nunito', sans-serif;
      margin-bottom: 20px;

    @media (max-width: 480px) {

<div class="page">
  <div id="ambient-strip"></div>
  <div id="app">
    <div style="padding:60px 0;text-align:center;color:#a8a29e;font-family:'Nunito',sans-serif;font-size:14px;">Loading…</div>

</div>

<script>
const BOOKS = [
  {name:"Matthew",        ch:28, phase:1},
  {name:"Mark",           ch:16, phase:1},
  {name:"Luke",           ch:24, phase:1},
  {name:"John",           ch:21, phase:1},
  {name:"Acts",           ch:28, phase:2},
  {name:"Romans",         ch:16, phase:3},
  {name:"1 Corinthians",  ch:16, phase:3},
  {name:"2 Corinthians",  ch:13, phase:3},
  {name:"Galatians",      ch:6,  phase:3},
  {name:"Ephesians",      ch:6,  phase:3},
  {name:"Philippians",    ch:4,  phase:3},
  {name:"Colossians",     ch:4,  phase:3},
  {name:"1 Thessalonians",ch:5,  phase:3},
  {name:"2 Thessalonians",ch:3,  phase:3},
  {name:"1 Timothy",      ch:6,  phase:3},
  {name:"2 Timothy",      ch:4,  phase:3},
  {name:"Titus",          ch:3,  phase:3},
  {name:"Philemon",       ch:1,  phase:3},
  {name:"Hebrews",        ch:13, phase:3},
  {name:"James",          ch:5,  phase:4},
  {name:"1 Peter",        ch:5,  phase:4},
  {name:"2 Peter",        ch:3,  phase:4},
  {name:"1 John",         ch:5,  phase:4},
  {name:"2 John",         ch:1,  phase:4},
  {name:"3 John",         ch:1,  phase:4},
  {name:"Jude",           ch:1,  phase:4},
  {name:"Revelation",     ch:22, phase:5}
];

const PHASE_COLORS = {1:"#111",2:"#444",3:"#666",4:"#888",5:"#aaa"};
const PHASE_LABELS = {1:"Gospels",2:"Acts",3:"Epistles",4:"Gen. Epistles",5:"Revelation"};
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const WDAYS  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function buildSchedule() {
  const flat = [];
  for (const b of BOOKS) for (let c = 1; c <= b.ch; c++) flat.push({book:b.name, ch:c, phase:b.phase});
  const chunks = [];
  for (let i = 0; i < flat.length; i += 4) chunks.push(flat.slice(i, i+4));
  let cur = new Date(2026, 5, 1);
  return chunks.map((items, id) => {
    const groups = []; let g = null;
    for (const x of items) {
      if (g && g.book===x.book) g.end = x.ch;
      else { if (g) groups.push(g); g = {book:x.book, start:x.ch, end:x.ch}; }
    }
    if (g) groups.push(g);
    const reading = groups.map(gr => gr.start===gr.end ? `${gr.book} ${gr.start}` : `${gr.book} ${gr.start}–${gr.end}`).join(', ');
    const entry = {id, date:new Date(cur), reading, phase:items[0].phase};
    cur = new Date(cur.getTime()+864e5);
    return entry;
  });
}

function groupByWeek(sched) {
  const weeks = []; let lastW = -1;
  for (const d of sched) {
    const diff = Math.floor((d.date - sched[0].date) / 864e5);
    const w = Math.floor(diff/7);
    if (w !== lastW) { weeks.push({wk:w+1, days:[]}); lastW = w; }
    weeks[weeks.length-1].days.push(d);
  }
  return weeks;
}

const SCHED = buildSchedule();
const WEEKS = groupByWeek(SCHED);

// Slot comes purely from URL: ?person=1 or ?person=2
// Progress lives entirely in Firebase — nothing important is in localStorage
function getSlotFromURL() {
  const p = new URLSearchParams(window.location.search).get('person');
  if (p === '1') return 0;
  if (p === '2') return 1;
  return null;
}

let mySlot = getSlotFromURL(); // 0, 1, or null (viewer/setup)
let setupSlot = null;
let shared = {p1:{name:'',done:{},notes:{}}, p2:{name:'',done:{},notes:{}}};
let expandedWeeks = new Set();
let openNotes = new Set(); // dayIds whose note panel is open
let db = null;
let pendingCheckAnim = null; // {id, pk} — set before render(), consumed after

function initials(n) {
  if (!n) return '?';
  return n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);
}
function fmtShort(d) { return `${MONTHS[d.getMonth()]} ${d.getDate()}`; }
function pkey(s) { return s===0 ? 'p1' : 'p2'; }
function pctOf(done, total) { return total===0 ? 0 : Math.round(Object.keys(done||{}).length/total*100); }
function getTodayId() {
  const today = new Date(); today.setHours(0,0,0,0);
  const entry = SCHED.find(d => {
    const dd = new Date(d.date); dd.setHours(0,0,0,0);
    return dd.getTime() === today.getTime();
  });
  return entry ? entry.id : null;
}

function findCurrentWeekIdx() {
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i=0; i<WEEKS.length; i++) {
    for (const d of WEEKS[i].days) {
      const dd = new Date(d.date); dd.setHours(0,0,0,0);
      if (dd >= today) return i;
    }
  }
  return WEEKS.length-1;
}

function saveExpandedWeeks() {
  localStorage.setItem('nt-weeks-2026', JSON.stringify([...expandedWeeks]));
}

function loadExpandedWeeks() {
  const saved = localStorage.getItem('nt-weeks-2026');
  if (saved) {
    try { expandedWeeks = new Set(JSON.parse(saved)); return; } catch {}
  }
  expandedWeeks.add(findCurrentWeekIdx());
}

async function writePath(path, value) {
  if (!db) return;
  try {
    if (value === null) await db.ref(path).remove();
    else await db.ref(path).set(value);
  } catch (e) { console.error('Firebase write error:', e); }
}

// ── Time-of-day gradient ──────────────────────────────────────────
const TIME_THEMES = [
  { h:[0,5],  c:['#e2e4ee','#dcdfe9','#dfe2ec','#e2e4ee'], accent:'#686b96', label:'night'       },
  { h:[5,7],  c:['#ede8e0','#e8e0d5','#f0e8de','#ede8e0'], accent:'#8a7060', label:'dawn'        },
  { h:[7,10], c:['#e8ece3','#e4e8df','#ecefe8','#e8ece3'], accent:'#587258', label:'morning'     },
  { h:[10,13],c:['#e3e9ee','#dfe6ec','#e6ecf0','#e3e9ee'], accent:'#4a7080', label:'midday'      },
  { h:[13,16],c:['#eee8e0','#e8e0d4','#ece6da','#eee8e0'], accent:'#7a6848', label:'afternoon'   },
  { h:[16,18],c:['#ede4d2','#e8dcc6','#ecddd0','#ede4d2'], accent:'#906040', label:'golden hour' },
  { h:[18,20],c:['#ece3dd','#e6dbd4','#e8ddd8','#ece3dd'], accent:'#885060', label:'sunset'      },
  { h:[20,22],c:['#e4dfe9','#ddd8e6','#e0dcea','#e4dfe9'], accent:'#604878', label:'dusk'        },
  { h:[22,24],c:['#e2e4ee','#dcdfe9','#dfe2ec','#e2e4ee'], accent:'#686b96', label:'night'       },
];

let currentThemeLabel = '';
let weatherState = null; // { tempF, label, emoji, tint, str }

function hexLerp(a, b, t) {
  const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
  const ch = (sh) => Math.round(((ah >> sh) & 0xff) + (((bh >> sh) & 0xff) - ((ah >> sh) & 0xff)) * t).toString(16).padStart(2, '0');
  return '#' + ch(16) + ch(8) + ch(0);
}

function wmoToWeather(code) {
  if (code === 0)                   return { label:'clear',         emoji:'☀️',  tint:'#f0e8d0', str:0    };
  if (code === 1)                   return { label:'mainly clear',  emoji:'🌤',  tint:'#e8e4dc', str:0.05 };
  if (code === 2)                   return { label:'partly cloudy', emoji:'⛅',  tint:'#e0e0dc', str:0.12 };
  if (code === 3)                   return { label:'overcast',      emoji:'☁️',  tint:'#d0d0ce', str:0.24 };
  if (code===45||code===48)         return { label:'fog',           emoji:'🌫',  tint:'#c8c8c6', str:0.20 };
  if (code>=51&&code<=57)           return { label:'drizzle',       emoji:'🌦',  tint:'#c2cad4', str:0.22 };
  if (code>=61&&code<=67)           return { label:'rain',          emoji:'🌧️',  tint:'#bcc4d0', str:0.28 };
  if (code>=71&&code<=77)           return { label:'snow',          emoji:'🌨️',  tint:'#d2e2f0', str:0.22 };
  if (code>=80&&code<=82)           return { label:'showers',       emoji:'🌦',  tint:'#bcc4d0', str:0.25 };
  if (code===85||code===86)         return { label:'snow showers',  emoji:'🌨️',  tint:'#d2e2f0', str:0.20 };
  if (code>=95)                     return { label:'thunderstorm',  emoji:'⛈️',  tint:'#b0b4c2', str:0.35 };
  return                                   { label:'cloudy',        emoji:'⛅',  tint:'#d4d4d0', str:0.15 };
}

function getMoonPhase() {
  const known = new Date('2000-01-06T18:14:00Z');
  const CYCLE = 29.530588853;
  const frac = (((Date.now() - known) / 86400000) % CYCLE + CYCLE) % CYCLE / CYCLE;
  const PHASES = [
    { name:'new moon',        emoji:'🌑', max:0.0625 },
    { name:'waxing crescent', emoji:'🌒', max:0.25   },
    { name:'first quarter',   emoji:'🌓', max:0.375  },
    { name:'waxing gibbous',  emoji:'🌔', max:0.5    },
    { name:'full moon',       emoji:'🌕', max:0.5625 },
    { name:'waning gibbous',  emoji:'🌖', max:0.75   },
    { name:'last quarter',    emoji:'🌗', max:0.875  },
    { name:'waning crescent', emoji:'🌘', max:1.0    },
  ];
  return PHASES.find(p => frac < p.max) || PHASES[0];
}

async function fetchWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=42.3601&longitude=-71.0589&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=America%2FNew_York');
    const j = await r.json();
    const w = wmoToWeather(j.current.weather_code);
    weatherState = { tempF: Math.round(j.current.temperature_2m), ...w };
    applyTimeTheme(); // re-tint with weather
  } catch (e) { console.warn('Weather fetch failed:', e); }
}

function renderAmbientStrip() {
  const el = document.getElementById('ambient-strip');
  if (!el) return;
  const moon = getMoonPhase();
  const parts = [moon.emoji + ' ' + moon.name];
  if (weatherState) parts.push(`boston ${weatherState.tempF}°f ${weatherState.emoji} ${weatherState.label}`);
  if (currentThemeLabel) parts.push(currentThemeLabel);
  el.textContent = parts.join('  ·  ');
}

function applyTimeTheme() {
  const h = new Date().getHours();
  const theme = TIME_THEMES.find(t => h >= t.h[0] && h < t.h[1]) || TIME_THEMES[0];
  currentThemeLabel = theme.label;
  const root = document.documentElement;
  const cols = (weatherState && weatherState.str > 0)
    ? theme.c.map(c => hexLerp(c, weatherState.tint, weatherState.str))
    : theme.c;
  cols.forEach((col, i) => root.style.setProperty(`--grad-${i+1}`, col));
  root.style.setProperty('--accent', theme.accent);
  renderAmbientStrip();
}

function confettiBurst() {
  const COLS = ['#f9c846','#f87171','#60a5fa','#34d399','#a78bfa','#fb923c','#f472b6'];
  const cx = 50, cy = 42; // viewport % origin
  const particles = [];
  for (let i = 0; i < 88; i++) {
    const el = document.createElement('div');
    const sz = 5 + Math.random() * 7;
    el.style.cssText = `position:fixed;pointer-events:none;z-index:9999;` +
      `width:${sz}px;height:${sz}px;` +
      `background:${COLS[Math.floor(Math.random()*COLS.length)]};` +
      `border-radius:${Math.random()>0.45?'50%':'2px'};` +
      `left:${cx}vw;top:${cy}vh;will-change:transform,opacity;`;
    document.body.appendChild(el);
    const angle = Math.random() * Math.PI * 2;
    const spd = 0.18 + Math.random() * 0.38;
    particles.push({
      el, x:cx, y:cy,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd - 0.55,
      gravity: 0.016 + Math.random()*0.012,
      rot: Math.random()*360, rotV: (Math.random()-0.5)*14,
      opacity: 1,
    });
  }
  let t = 0;
  function tick() {
    t++; let alive = false;
    for (const p of particles) {
      p.vy += p.gravity; p.x += p.vx; p.y += p.vy;
      p.rot += p.rotV;
      if (t > 28) p.opacity = Math.max(0, p.opacity - 0.02);
      p.el.style.left = p.x + 'vw'; p.el.style.top = p.y + 'vh';
      p.el.style.transform = `rotate(${p.rot}deg)`;
      p.el.style.opacity = p.opacity;
      if (p.opacity > 0) alive = true;
    }
    if (alive) requestAnimationFrame(tick);
    else particles.forEach(p => p.el.remove());
  }
  requestAnimationFrame(tick);
}

async function init() {
  applyTimeTheme(); // sets theme + renders ambient strip (moon + time label)
  setInterval(applyTimeTheme, 5 * 60 * 1000);
  fetchWeather(); // async — re-tints gradient + adds weather to strip when done
  setInterval(fetchWeather, 30 * 60 * 1000);
  loadExpandedWeeks();
  render(); // show UI immediately; Firebase will update it

  let cfg = null;
  try {
    const res = await fetch('/api/firebase-config');
    cfg = await res.json();
  } catch (e) {
    console.warn('Could not reach /api/firebase-config:', e);
  }

  if (!cfg?.apiKey) {
    renderConfigNotice();
    return;
  }

  try {
    firebase.initializeApp(cfg);
    db = firebase.database();
    db.ref('nt-plan').on('value', snap => {
      const val = snap.val();
      if (val) {
        shared = {
          p1: {name: val.p1?.name||'', done: val.p1?.done||{}, notes: val.p1?.notes||{}},
          p2: {name: val.p2?.name||'', done: val.p2?.done||{}, notes: val.p2?.notes||{}}
        };
      }
      render();
    });
  } catch (e) {
    console.error('Firebase init error:', e);
    render();
  }
}

function selectSlot(s) { setupSlot = s; render(); }

function confirmSlot() {
  if (setupSlot === null) return;
  // Navigate to the URL with ?person=1 or ?person=2 — bookmark this!
  window.location.href = `?person=${setupSlot + 1}`;
}

async function saveName() {
  const input = document.getElementById('nameInput');
  if (!input) return;
  const val = input.value.trim();
  if (!val) return;
  const pk = pkey(mySlot);
  const lbl = document.getElementById('savingLabel');
  if (lbl) lbl.textContent = 'Saving…';
  await writePath(`nt-plan/${pk}/name`, val);
  if (!db) { shared[pk] = shared[pk] || {name:'',done:{}}; shared[pk].name = val; render(); }
}

async function toggleDay(id) {
  const pk = pkey(mySlot);
  const isDone = !!(shared[pk]?.done || {})[id];
  if (!shared[pk].done) shared[pk].done = {};
  if (isDone) {
    delete shared[pk].done[id];
  } else {
    shared[pk].done[id] = true;
    pendingCheckAnim = {id, pk};
    // confetti when both are now done
    const otherPk = pk === 'p1' ? 'p2' : 'p1';
    if ((shared[otherPk]?.done || {})[id]) setTimeout(confettiBurst, 320);
  }
  render();
  if (pendingCheckAnim) {
    requestAnimationFrame(() => {
      const el = document.getElementById(`av-${pk}-${id}`);
      if (el) { el.classList.add('check-pop'); setTimeout(() => el.classList.remove('check-pop'), 500); }
      pendingCheckAnim = null;
    });
  }
  await writePath(`nt-plan/${pk}/done/${id}`, isDone ? null : true);
}

function toggleWeek(wi) {
  if (expandedWeeks.has(wi)) expandedWeeks.delete(wi);
  else expandedWeeks.add(wi);
  saveExpandedWeeks(); render();
}

function toggleNote(dayId) {
  if (openNotes.has(dayId)) openNotes.delete(dayId);
  else openNotes.add(dayId);
  render();
}

async function saveNote(dayId) {
  if (mySlot === null) return;
  const pk = pkey(mySlot);
  const el = document.getElementById(`note-${pk}-${dayId}`);
  if (!el) return;
  const text = el.value.trim();
  shared[pk].notes = shared[pk].notes || {};
  if (text) shared[pk].notes[dayId] = text;
  else delete shared[pk].notes[dayId];
  await writePath(`nt-plan/${pk}/notes/${dayId}`, text || null);
}

function switchSlot() {
  // Drop back to base URL without ?person param
  window.location.href = window.location.pathname;
}

function render() {
  if (mySlot===null) { renderSetup(); return; }
  if (!shared[pkey(mySlot)]?.name) { renderNameEntry(); return; }
  renderMain();
}

function renderConfigNotice() {
  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-eyebrow">Summer 2026</div>
      <div class="header-title">NT Reading Plan</div>
    </div>
    <div class="config-notice">
      <strong>Firebase not configured.</strong>
      Add environment variables to your Vercel project and redeploy.
    </div>
  `;
}

      border-radius:18px; padding:24px 14px;
      transition:transform 0.12s, border-color 0.12s;

      <div style="width:52px;height:52px;border-radius:50%;

        ${name || 'Person ' + (slot + 1)}
      </div>
      <div style="font-size:11px;color:#999;margin-top:4px;">${name ? '✦ claimed' : 'open'}</div>
    </div>`;

  document.getElementById('app').innerHTML = `
    <div style="min-height:calc(100vh - 120px);display:flex;flex-direction:column;
      align-items:center;justify-content:center;text-align:center;padding:40px 0;">
      <div style="margin-bottom:44px;">
        <div style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
          color:#aaa;margin-bottom:10px;">Summer 2026</div>
        <div style="font-family:'Lora',serif;font-size:34px;font-weight:500;
          color:#111;line-height:1.2;margin-bottom:8px;">NT Reading Plan</div>
        <div style="font-size:13px;color:#888;">4 chapters · every day · Jun 1 → Aug 4</div>
      </div>
      <div style="display:flex;flex-direction:row;gap:14px;width:100%;max-width:360px;margin-bottom:28px;">
        ${card(0, p1n, s === 0)}
        ${card(1, p2n, s === 1)}
      </div>
      <button onclick="confirmSlot()" ${s === null ? 'disabled' : ''} style="
        padding:13px 40px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
        background:var(--accent);color:#fff;border:none;border-radius:12px;
        cursor:${s === null ? 'default' : 'pointer'};
        opacity:${s === null ? 0.35 : 1};
        transition:opacity 0.15s,transform 0.1s;
        box-shadow:0 4px 20px rgba(0,0,0,0.18);">
        Continue →
      </button>
      <div style="font-size:11px;color:#bbb;margin-top:18px;max-width:260px;line-height:1.7;">
        Bookmark your URL — progress lives in the cloud ✦
      </div>
    </div>
  `;
}

function renderNameEntry() {
  const other = mySlot === 0 ? (shared.p2?.name || '') : (shared.p1?.name || '');
  document.getElementById('app').innerHTML = `
    <div style="min-height:calc(100vh - 120px);display:flex;flex-direction:column;
      align-items:center;justify-content:center;text-align:center;padding:40px 0;">
      <div style="margin-bottom:36px;">
        <div style="font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
          color:#aaa;margin-bottom:10px;">Summer 2026</div>
        <div style="font-family:'Lora',serif;font-size:34px;font-weight:500;
          color:#111;line-height:1.2;margin-bottom:8px;">What's your name?</div>
        <div style="font-size:13px;color:#888;">
          ${other ? `Reading with <strong style="color:#555;">${other}</strong> ✦` : 'Your reading partner will join soon.'}
        </div>
      </div>
      <input id="nameInput" type="text" placeholder="Your name" maxlength="20" autocomplete="off" style="
        width:100%;max-width:260px;padding:13px 18px;
        font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;
        border:2px solid #ddd;border-radius:12px;
        background:rgba(255,255,255,0.9);color:#111;
        outline:none;margin-bottom:14px;text-align:center;
        transition:border-color 0.15s;" />
      <button onclick="saveName()" style="
        padding:13px 40px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;
        background:var(--accent);color:#fff;border:none;border-radius:12px;
        cursor:pointer;transition:opacity 0.15s;
        box-shadow:0 4px 20px rgba(0,0,0,0.18);">
        Start reading →
      </button>
      <div id="savingLabel" style="font-size:11px;color:#bbb;margin-top:10px;min-height:16px;"></div>
      <div style="font-size:12px;color:#ccc;margin-top:14px;">
        <span onclick="switchSlot()" style="cursor:pointer;text-decoration:underline;color:#aaa;">← Switch slot</span>
      </div>
    </div>
  `;
  const inp = document.getElementById('nameInput');
  inp.focus();
  inp.addEventListener('focus', () => inp.style.borderColor = '#999');
  inp.addEventListener('blur',  () => inp.style.borderColor = '#ddd');
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveName(); });
}

function renderMain() {
  const p1 = shared.p1||{name:'',done:{}};
  const p2 = shared.p2||{name:'',done:{}};
  const total = SCHED.length;
  const d1 = Object.keys(p1.done||{}).length;
  const d2 = Object.keys(p2.done||{}).length;
  const pct1 = pctOf(p1.done, total);
  const pct2 = pctOf(p2.done, total);

  let html = `
    <div class="header" style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div class="header-eyebrow">Summer 2026</div>
        <div class="header-title">NT Reading Plan</div>
        <div class="header-sub">4 chapters/day · every day · Jun 1 – Aug 4</div>
      </div>
      <button onclick="switchSlot()"
        style="font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;
               background:none;border:1px solid var(--border);border-radius:8px;
               padding:5px 10px;cursor:pointer;color:var(--muted);margin-top:4px;white-space:nowrap;">
        switch person
      </button>
    </div>
    <div class="progress-grid">
      <div class="progress-card">
        <div class="progress-card-top">
          <div class="avatar-lg" style="background:var(--blue-bg);color:var(--blue);">${initials(p1.name)}</div>
          <div>
            <div class="name-label">${p1.name||'Person 1'}${mySlot===0?'<span class="you-tag" style="background:var(--blue-bg);color:var(--blue);">you</span>':''}</div>
            <div class="count-label">${d1} / ${total} days · ${pct1}%</div>
          </div>
        </div>
        <div class="pbar-track"><div class="pbar-fill" style="width:${pct1}%;background:var(--blue);"></div></div>
      </div>
      <div class="progress-card">
        <div class="progress-card-top">
          <div class="avatar-lg" style="background:var(--rose-bg);color:var(--rose);">${initials(p2.name)}</div>
          <div>
            <div class="name-label">${p2.name||'Person 2'}${mySlot===1?'<span class="you-tag" style="background:var(--rose-bg);color:var(--rose);">you</span>':''}</div>
            <div class="count-label">${d2} / ${total} days · ${pct2}%</div>
          </div>
        </div>
        <div class="pbar-track"><div class="pbar-fill" style="width:${pct2}%;background:var(--rose);"></div></div>
      </div>
    </div>
  `;

  const todayId = getTodayId();

  for (let wi=0; wi<WEEKS.length; wi++) {
    const week = WEEKS[wi];
    const isExp = expandedWeeks.has(wi);
    const wt = week.days.length;
    const w1done = week.days.filter(d=>(p1.done||{})[d.id]).length;
    const w2done = week.days.filter(d=>(p2.done||{})[d.id]).length;
    const phasesSeen = [...new Set(week.days.map(d=>d.phase))];

    html += `
      <div class="week"><div class="week-card">
        <div class="week-header" onclick="toggleWeek(${wi})">
          <div class="week-header-left">
            <span class="week-num">Week ${week.wk}</span>
            <span class="week-dates">${fmtShort(week.days[0].date)} – ${fmtShort(week.days[wt-1].date)}</span>
            ${phasesSeen.map(p=>`<span class="phase-chip" style="color:${PHASE_COLORS[p]};background:${PHASE_COLORS[p]}18;">${PHASE_LABELS[p]}</span>`).join('')}
          </div>
          <div class="week-header-right">
            <span class="mini-progress">
              <span style="color:var(--blue);">${w1done}</span>
              <span style="color:var(--hint);">/</span>
              <span style="color:var(--rose);">${w2done}</span>
              <span style="color:var(--hint);">&thinsp;of ${wt}</span>
            </span>
            <span class="chevron ${isExp?'open':''}">▾</span>
          </div>
        </div>
    `;

    if (isExp) {
      html += `<div class="week-body">`;
      for (const d of week.days) {
        const done1 = !!(p1.done||{})[d.id];
        const done2 = !!(p2.done||{})[d.id];
        const bothDone = done1 && done2;
        const isToday = d.id === todayId;
        const pc = PHASE_COLORS[d.phase];
        const av1bg = done1 ? 'var(--blue)' : 'var(--blue-bg)', av1fg = done1 ? '#fff' : 'var(--blue)';
        const av2bg = done2 ? 'var(--rose)' : 'var(--rose-bg)', av2fg = done2 ? '#fff' : 'var(--rose)';
        const note1 = (p1.notes||{})[d.id] || '';
        const note2 = (p2.notes||{})[d.id] || '';
        const hasNote = note1 || note2;
        const noteOpen = openNotes.has(d.id);

        // note panel html
        let notePanelHtml = '';
        if (noteOpen) {
          const myNote  = mySlot===0 ? note1 : mySlot===1 ? note2 : '';
          const theirNote = mySlot===0 ? note2 : mySlot===1 ? note1 : '';
          const theirName = mySlot===0 ? (p2.name||'Person 2') : (p1.name||'Person 1');
          const myPk = mySlot !== null ? pkey(mySlot) : '';
          notePanelHtml = `<div class="note-panel">`;
          if (mySlot !== null) {
            notePanelHtml += `
              <div class="note-entry">
                <div class="note-label">Your note</div>
                <textarea class="note-textarea" id="note-${myPk}-${d.id}"
                  placeholder="Write your thoughts…"
                  onblur="saveNote(${d.id})"
                >${myNote}</textarea>
              </div>`;
          }
          notePanelHtml += `
              <div class="note-entry">
                <div class="note-label">${theirName}</div>
                ${theirNote
                  ? `<div class="note-text">${theirNote.replace(/</g,'&lt;')}</div>`
                  : `<div class="note-empty">Nothing yet</div>`}
              </div>
            </div>`;
        }

        html += `
          <div class="day-row${bothDone?' both-done':''}${isToday?' today-row':''}">
            <div class="day-date">
              <div class="day-weekday">${WDAYS[d.date.getDay()]}</div>
              <div class="day-datenum">${fmtShort(d.date)}</div>
            </div>
            <div class="phase-pip" style="background:${pc};"></div>
            <div class="day-reading${bothDone?' faded':''}">${d.reading}</div>
            <div class="day-checks">
              <button class="note-toggle${hasNote?' has-note':''}"
                onclick="toggleNote(${d.id})" title="Notes">
                ${noteOpen ? '✕' : '✎'}
              </button>
              <div class="check-avatar ${mySlot===0?'mine':'not-mine'}"
                id="av-p1-${d.id}"
                style="background:${av1bg};color:${av1fg};"
                ${mySlot===0?`onclick="toggleDay(${d.id})"`:''}
                title="${p1.name||'Person 1'}">
                ${done1?'<span class="checkmark">✓</span>':initials(p1.name||'P1')}
              </div>
              <div class="check-avatar ${mySlot===1?'mine':'not-mine'}"
                id="av-p2-${d.id}"
                style="background:${av2bg};color:${av2fg};"
                ${mySlot===1?`onclick="toggleDay(${d.id})"`:''}
                title="${p2.name||'Person 2'}">
                ${done2?'<span class="checkmark">✓</span>':initials(p2.name||'P2')}
              </div>
            </div>
          </div>
          ${notePanelHtml}
        `;
      }
      html += `</div>`;
    }
    html += `</div></div>`;
  }

  document.getElementById('app').innerHTML = html;
}

window.selectSlot  = selectSlot;
window.confirmSlot = confirmSlot;
window.saveName    = saveName;
window.toggleDay   = toggleDay;
window.toggleWeek  = toggleWeek;
window.switchSlot  = switchSlot;
window.toggleNote  = toggleNote;
window.saveNote    = saveNote;

init();
</script>
